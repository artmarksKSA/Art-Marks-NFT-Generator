<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Marks - Hologram NFT</title>
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 20px; 
        }
        h1 { color: #4a7e6e; text-shadow: 0 0 10px #4a7e6e; }
        .box { 
            border: 2px dashed #4a7e6e; 
            padding: 40px; 
            margin: 20px auto; 
            max-width: 400px; 
            cursor: pointer; 
            background: rgba(74, 126, 110, 0.1);
        }
        .box:hover { background: rgba(74, 126, 110, 0.2); }
        #controls { 
            background: #111; 
            padding: 20px; 
            border-radius: 10px; 
            margin: 20px auto; 
            max-width: 400px; 
            display: none;
            border: 1px solid #333;
        }
        input[type="text"], input[type="range"] { 
            width: 90%; 
            padding: 10px; 
            margin: 5px; 
            background: #222; 
            border: 1px solid #4a7e6e; 
            color: #fff; 
        }
        button { 
            background: #4a7e6e; 
            color: #fff; 
            border: none; 
            padding: 10px 20px; 
            margin: 5px; 
            cursor: pointer; 
        }
        canvas { 
            border: 2px solid #4a7e6e; 
            max-width: 100%; 
            margin-top: 20px; 
            display: none;
        }
        #status { color: #4a7e6e; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>ART MARKS // HOLOGRAM</h1>
    
    <div class="box" onclick="document.getElementById('file').click()">
        <input type="file" id="file" accept="image/*" style="display:none" onchange="loadImage(event)">
        <p>📤 اضغط هنا لرفع الصورة</p>
    </div>

    <div id="controls">
        <p>ارتفاع الهولوغرام: <span id="val">40</span></p>
        <input type="range" id="el" min="0" max="80" value="40" oninput="document.getElementById('val').innerText=this.value">
        
        <input type="text" id="t" value="ARTWORK" placeholder="اسم العمل"><br>
        <input type="text" id="a" value="ARTIST" placeholder="الفنان"><br><br>
        
        <button onclick="generate()">✨ إنشاء البطاقة</button>
        <button onclick="save()">💾 تحميل</button>
    </div>

    <canvas id="c" width="600" height="800"></canvas>
    <p id="status"></p>

    <script>
        let img = null;
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');

        function loadImage(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('status').innerText = 'جاري التحميل...';
            
            const reader = new FileReader();
            reader.onload = function(event) {
                img = new Image();
                img.onload = function() {
                    document.getElementById('controls').style.display = 'block';
                    canvas.style.display = 'inline-block';
                    document.getElementById('status').innerText = 'تم التحميل! اضغط إنشاء';
                    generate(); // توليد تلقائي عند التحميل
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function generate() {
            if (!img) {
                alert('يرجى رفع صورة أولاً');
                return;
            }
            
            const w = 600, h = 800;
            const el = parseInt(document.getElementById('el').value);
            const title = document.getElementById('t').value;
            const artist = document.getElementById('a').value;
            
            // خلفية سوداء
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, w, h);
            
            // قاعدة البطاقة
            const cy = h - 200;
            ctx.fillStyle = '#0f1f1a';
            ctx.strokeStyle = '#4a7e6e';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(50, cy);
            ctx.lineTo(550, cy);
            ctx.lineTo(530, cy+150);
            ctx.lineTo(70, cy+150);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            // الصورة الطافرة
            const iw = 350, ih = iw * 1.2;
            const ix = (w - iw) / 2;
            const iy = cy - ih + 50 - el;
            
            // ظلال الارتفاع (3D effect)
            for(let i=10; i>=0; i--) {
                ctx.fillStyle = `rgba(74,126,110,${0.1-i*0.008})`;
                ctx.fillRect(ix-i, iy+i*3, iw+i*2, ih+i*2);
            }
            
            // الصورة الأساسية
            ctx.drawImage(img, ix, iy, iw, ih);
            
            // طبقة فسفورية خضراء
            ctx.globalCompositeOperation = 'overlay';
            ctx.fillStyle = 'rgba(74, 126, 110, 0.3)';
            ctx.fillRect(ix, iy, iw, ih);
            ctx.globalCompositeOperation = 'source-over';
            
            // إطار مضيء
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#4a7e6e';
            ctx.strokeStyle = '#4a7e6e';
            ctx.lineWidth = 3;
            ctx.strokeRect(ix, iy, iw, ih);
            ctx.shadowBlur = 0;
            
            // النص
            ctx.fillStyle = '#d3cbab';
            ctx.textAlign = 'center';
            ctx.font = 'bold 28px Arial';
            ctx.fillText(title, w/2, cy+60);
            ctx.fillStyle = '#4a7e6e';
            ctx.font = '20px Arial';
            ctx.fillText(artist, w/2, cy+90);
            ctx.font = '14px Arial';
            ctx.fillText('◉ AUTHENTICATED // 1/1', w/2, cy+120);
            
            document.getElementById('status').innerText = 'تم الإنشاء!';
        }

        function save() {
            const link = document.createElement('a');
            link.download = 'ArtMarks_Hologram.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
