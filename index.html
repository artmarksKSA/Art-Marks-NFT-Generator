<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Marks - Professional Cyber Hologram</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #020202;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(74, 126, 110, 0.1) 0%, transparent 50%),
                linear-gradient(0deg, transparent 24%, rgba(0, 255, 255, 0.02) 25%, rgba(0, 255, 255, 0.02) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, 0.02) 75%, rgba(0, 255, 255, 0.02) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 255, 255, 0.02) 25%, rgba(0, 255, 255, 0.02) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, 0.02) 75%, rgba(0, 255, 255, 0.02) 76%, transparent 77%, transparent);
            background-size: 100% 100%, 50px 50px, 50px 50px;
        }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        .upload-section {
            margin: 20px 0;
            text-align: center;
        }
        .cyber-btn {
            background: linear-gradient(45deg, transparent 5%, var(--main-color) 5%);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
            transition: 0.3s;
            text-transform: uppercase;
        }
        .cyber-btn:hover {
            filter: brightness(1.3);
            transform: scale(1.05);
        }
        .data-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 800px;
            width: 100%;
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 20, 20, 0.5);
            border: 1px solid #333;
            border-radius: 10px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 0.8em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input[type="text"], select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            font-family: 'Share Tech Mono', monospace;
            border-radius: 4px;
            transition: 0.3s;
        }
        input[type="text"]:focus, select:focus {
            border-color: var(--main-color);
            outline: none;
            box-shadow: 0 0 10px var(--main-color);
        }
        .controls {
            display: flex;
            gap: 20px;
            margin: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        input[type="range"] {
            width: 150px;
            height: 6px;
            -webkit-appearance: none;
            background: #333;
            outline: none;
            border-radius: 3px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--main-color);
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--main-color);
        }
        .action-btn {
            background: transparent;
            border: 2px solid var(--main-color);
            color: var(--main-color);
            padding: 12px 30px;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }
        .action-btn:hover {
            background: var(--main-color);
            color: #000;
            box-shadow: 0 0 20px var(--main-color);
        }
        #canvas-container {
            position: relative;
            margin: 30px auto;
            filter: drop-shadow(0 0 30px rgba(0, 255, 255, 0.2));
        }
        canvas {
            display: block;
            border-radius: 10px;
        }
        .hidden { display: none !important; }
        .color-mode {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .color-btn {
            width: 30px;
            height: 30px;
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }
        .color-btn:hover { transform: scale(1.2); }
        .color-btn.active { box-shadow: 0 0 15px currentColor; }
    </style>
</head>
<body>

<h1 style="color: var(--main-color); text-shadow: 0 0 20px var(--main-color);">ART MARKS // NFT</h1>
<p style="color: #666; margin-bottom: 20px;">PROFESSIONAL HOLOGRAPHIC AUTHENTICATION SYSTEM</p>

<div class="upload-section">
    <button class="cyber-btn" onclick="document.getElementById('file').click()" style="--main-color: #00d4ff;">
        📤 رفع اللوحة الفنية
    </button>
    <input type="file" id="file" accept="image/*" style="display:none" onchange="init(event)">
</div>

<!-- بيانات البطاقة -->
<div class="data-form hidden" id="dataForm">
    <div class="input-group">
        <label>اسم العمل (Artwork)</label>
        <input type="text" id="artName" value="CYBER LEOPARD" oninput="updatePreview()">
    </div>
    <div class="input-group">
        <label>الفنان (Artist)</label>
        <input type="text" id="artistName" value="F12DM" oninput="updatePreview()">
    </div>
    <div class="input-group">
        <label>الرقم التسلسلي (ID)</label>
        <input type="text" id="serialNum" value="#001" oninput="updatePreview()">
    </div>
    <div class="input-group">
        <label>الندرة (Rarity)</label>
        <select id="rarity" onchange="updatePreview()">
            <option value="COMMON">COMMON</option>
            <option value="RARE">RARE</option>
            <option value="EPIC">EPIC</option>
            <option value="LEGENDARY" selected>LEGENDARY</option>
        </select>
    </div>
    <div class="input-group">
        <label>القيمة (Value)</label>
        <input type="text" id="value" value="3.5 ETH" oninput="updatePreview()">
    </div>
    <div class="input-group">
        <label>المجموعة (Collection)</label>
        <input type="text" id="collection" value="ANIMAL KINGDOM" oninput="updatePreview()">
    </div>
</div>

<!-- التحكمات -->
<div class="controls hidden" id="controls" style="--main-color: #00d4ff;">
    <div class="control-group">
        <label>وضع اللون (Color Mode)</label>
        <div class="color-mode">
            <div class="color-btn active" style="background: #00ffaa; --main-color: #00ffaa;" onclick="setColor('#00ffaa', this)" title="Phosphor
