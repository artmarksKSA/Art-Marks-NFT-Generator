<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Marks - Cyberpunk Hologram Transformer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            background: #050505; 
            color: #fff; 
            font-family: 'Tajawal', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: linear-gradient(180deg, rgba(74,126,110,0.2) 0%, transparent 100%);
            border-bottom: 1px solid #4a7e6e;
        }
        h1 { 
            font-family: 'Orbitron', sans-serif; 
            color: #4a7e6e; 
            text-shadow: 0 0 20px #4a7e6e;
            margin: 0;
            font-size: 2em;
        }
        .upload-area {
            margin: 20px;
            padding: 20px 40px;
            border: 2px dashed #4a7e6e;
            border-radius: 10px;
            cursor: pointer;
            background: rgba(74,126,110,0.1);
            transition: 0.3s;
            color: #d3cbab;
        }
        .upload-area:hover { 
            background: rgba(74,126,110,0.2); 
            box-shadow: 0 0 20px rgba(74,126,110,0.3);
        }
        #canvas-container {
            position: relative;
            margin: 20px;
            box-shadow: 0 0 50px rgba(74, 126, 110, 0.5);
            border-radius: 15px;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: #000;
        }
        .controls {
            display: flex;
            gap: 20px;
            margin: 20px;
            flex-wrap: wrap;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        label { color: #d3cbab; font-size: 0.9em; }
        input[type="range"] {
            width: 150px;
            accent-color: #4a7e6e;
        }
        button {
            background: #4a7e6e;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(74,126,110,0.4);
            transition: 0.3s;
            margin: 5px;
        }
        button:hover {
            background: #5a9e8e;
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(74,126,110,0.6);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <h1>ART MARKS // CYBER HOLOGRAM</h1>
    <p style="color: #666; margin: 5px 0 0 0; font-size: 0.9em;">حوّل أي لوحة إلى هولوغرام ثلاثي الأبعاد متحرك</p>
</header>

<div class="upload-area" onclick="document.getElementById('file').click()">
    <input type="file" id="file" accept="image/*" style="display:none" onchange="loadImage(event)">
    <h3>📤 اضغط هنا لرفع الصورة</h3>
    <p style="font-size: 0.8em; margin: 5px 0 0 0;">سيتم تحويلها تلقائياً إلى أسلوب النيون الفسفوري</p>
</div>

<div id="controls" class="controls hidden">
    <div class="control-group">
        <label>شدة التوهج (Glow)</label>
        <input type="range" id="glow" min="10" max="100" value="50">
    </div>
    <div class="control-group">
        <label>سرعة الحركة (Float)</label>
        <input type="range" id="speed" min="1" max="10" value="3">
    </div>
    <div class="control-group">
        <label>التشويش الرقمي (Glitch)</label>
        <input type="range" id="glitch" min="0" max="10" value="3">
    </div>
    <button onclick="saveImage()">💾 حفظ الصورة الحالية</button>
</div>

<div id="canvas-container" class="hidden">
    <canvas id="canvas" width="600" height="800"></canvas>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let originalImage = null;
let processedImage = null;
let animationId = null;
let time = 0;

// Load and process image
function loadImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
            originalImage = img;
            processImage(); // Convert to neon style immediately
            document.getElementById('controls').classList.remove('hidden');
            document.getElementById('canvas-container').classList.remove('hidden');
            startAnimation();
        };
        img.src = event.target.result;
    };
    reader.readAsDataURL(file);
}

// Convert image colors to neon spectrum (Green/Cyan/Beige)
function processImage() {
    const w = originalImage.width;
    const h = originalImage.height;
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = w;
    tempCanvas.height = h;
    const tCtx = tempCanvas.getContext('2d');
    
    tCtx.drawImage(originalImage, 0, 0);
    const imgData = tCtx.getImageData(0, 0, w, h);
    const data = imgData.data;
    
    for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2];
        const brightness = (r + g + b) / 3;
        
        // Map to neon spectrum (Green -> Cyan -> Beige/Pink)
        if (brightness < 60) {
            // Shadows: Deep Art Green
            data[i] = 20; data[i+1] = 60; data[i+2] = 50;
        } else if (brightness < 120) {
            // Mid-tones: Art Green
            data[i] = 74; data[i+1] = 126; data[i+2] = 110;
        } else if (brightness < 180) {
            // Highlights: Cyan/Beige mix
            data[i] = 150; data[i+1] = 211; data[i+2] = 203;
        } else {
            // Brightest: White with cyan tint
            data[i] = 200; data[i+1] = 255; data[i+2] = 255;
        }
    }
    
    tCtx.putImageData(imgData, 0, 0);
    processedImage = tempCanvas;
}

// Main animation loop
function animate() {
    if (!processedImage) return;
    
    time += parseInt(document.getElementById('speed').value) * 0.02;
    const glow = parseInt(document.getElementById('glow').value);
    const glitchIntensity = parseInt(document.getElementById('glitch').value);
    
    const w = canvas.width;
    const h = canvas.height;
    const cx = w/2, cy = h/2;
    
    // Clear with fade effect for motion blur
    ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
    ctx.fillRect(0, 0, w, h);
    
    // Background grid
    ctx.strokeStyle = 'rgba(74, 126, 110, 0.1)';
    ctx.lineWidth = 1;
    const gridSize = 40;
    const offset = (time * 20) % gridSize;
    for(let x=0; x<w; x+=gridSize) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }
    for(let y=offset; y<h; y+=gridSize) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }
    
    // Floating animation parameters
    const floatY = Math.sin(time) * 15; // Up/down
    const rotate = Math.sin(time * 0.5) * 0.02; // Slight rotation
    const scale = 1 + Math.sin(time * 0.3) * 0.02; // Pulse size
    
    ctx.save();
    ctx.translate(cx, cy + floatY);
    ctx.rotate(rotate);
    ctx.scale(scale, scale);
    
    // Draw shadow/glow layers (3D depth)
    for(let i=5; i>0; i--) {
        ctx.globalAlpha = 0.1;
        ctx.shadowBlur = glow * (i/2);
        ctx.shadowColor = '#4a7e6e';
        ctx.drawImage(processedImage, -processedImage.width/2 - i, -processedImage.height/2 + i*2, processedImage.width, processedImage.height);
    }
    
    // Glitch effect (random slices)
    if (glitchIntensity > 0 && Math.random() < glitchIntensity * 0.1) {
        const sliceHeight = 20 + Math.random() * 50;
        const sliceY = Math.random() * processedImage.height;
        const offsetX = (Math.random() - 0.5) * 20;
        
        ctx.drawImage(processedImage, 0, sliceY, processedImage.width, sliceHeight, 
                     offsetX - processedImage.width/2, sliceY - processedImage.height/2, 
                     processedImage.width, sliceHeight);
        
        // RGB Shift (draw red and cyan channels offset)
        ctx.globalCompositeOperation = 'screen';
        ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
        ctx.fillRect(-processedImage.width/2 - 2, -processedImage.height/2, processedImage.width, processedImage.height);
        ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
        ctx.fillRect(-processedImage.width/2 + 2, -processedImage.height/2, processedImage.width, processedImage.height);
        ctx.globalCompositeOperation = 'source-over';
    } else {
        // Normal draw with neon glow
        ctx.globalAlpha = 1;
        ctx.shadowBlur = glow;
        ctx.shadowColor = '#4a7e6e';
        ctx.drawImage(processedImage, -processedImage.width/2, -processedImage.height/2);
    }
    
    // Scanlines on image
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    for(let i=0; i<processedImage.height; i+=4) {
        ctx.fillRect(-processedImage.width/2, -processedImage.height/2 + i, processedImage.width, 1);
    }
    
    ctx.restore();
    
    // Draw Cyber Frame (HUD)
    drawFrame(w, h, glow, time);
    
    // Draw Text Info
    ctx.textAlign = 'center';
    ctx.font = 'bold 24px "Orbitron"';
    ctx.fillStyle = '#d3cbab';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#4a7e6e';
    ctx.fillText('ART MARKS AUTHENTIC', cx, h - 80);
    
    ctx.font = '16px "Tajawal"';
    ctx.fillStyle = '#4a7e6e';
    ctx.fillText('EDITION 1/1 // PHOSPHOR HOLOGRAM', cx, h - 50);
    
    // Random circuit lines
    if (Math.random() > 0.9) {
        ctx.strokeStyle = 'rgba(74, 126, 110, 0.5)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        const lx = Math.random() * w;
        ctx.moveTo(lx, 0);
        ctx.lineTo(lx, Math.random() * 100);
        ctx.stroke();
    }
    
    animationId = requestAnimationFrame(animate);
}

function drawFrame(w, h, glow, time) {
    const padding = 20;
    const pulse = 1 + Math.sin(time * 2) * 0.1;
    
    ctx.save();
    ctx.strokeStyle = '#4a7e6e';
    ctx.lineWidth = 3;
    ctx.shadowBlur = glow * pulse;
    ctx.shadowColor = '#4a7e6e';
    
    // Draw corner brackets only (cyber style)
    const cornerSize = 40;
    
    // Top Left
    ctx.beginPath();
    ctx.moveTo(padding, padding + cornerSize);
    ctx.lineTo(padding, padding);
    ctx.lineTo(padding + cornerSize, padding);
    ctx.stroke();
    
    // Top Right
    ctx.beginPath();
    ctx.moveTo(w - padding - cornerSize, padding);
    ctx.lineTo(w - padding, padding);
    ctx.lineTo(w - padding, padding + cornerSize);
    ctx.stroke();
    
    // Bottom Left
    ctx.beginPath();
    ctx.moveTo(padding, h - padding - cornerSize);
    ctx.lineTo(padding, h - padding);
    ctx.lineTo(padding + cornerSize, h - padding);
    ctx.stroke();
    
    // Bottom Right
    ctx.beginPath();
    ctx.moveTo(w - padding - cornerSize, h - padding);
    ctx.lineTo(w - padding, h - padding);
    ctx.lineTo(w - padding, h - padding - cornerSize);
    ctx.stroke();
    
    // Animated lines on sides
    const lineY = (time * 50) % h;
    ctx.strokeStyle = 'rgba(211, 203, 171, 0.8)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(padding, lineY);
    ctx.lineTo(padding + 20, lineY);
    ctx.moveTo(w - padding, lineY);
    ctx.lineTo(w - padding - 20, lineY);
    ctx.stroke();
    
    ctx.restore();
}

function startAnimation() {
    if (animationId) cancelAnimationFrame(animationId);
    animate();
}

function saveImage() {
    const link = document.createElement('a');
    link.download = 'ArtMarks_Cyber_Hologram_' + Date.now() + '.png';
    link.href = canvas.toDataURL();
    link.click();
}

// Stop animation when tab hidden to save resources
document.addEventListener('visibilitychange', () => {
    if (document.hidden && animationId) {
        cancelAnimationFrame(animationId);
    } else if (!document.hidden && processedImage) {
        animate();
    }
});
</script>

</body>
</html>
